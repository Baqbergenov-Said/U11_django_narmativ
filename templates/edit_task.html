{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/edit_task.css' %}">

<div class="task-container">
    <form method="POST" class="edit-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" value="{{ task.title }}" required class="form-input">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="4">{{ task.description }}</textarea>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-select">
                <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pending</option>
                <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
            </select>   
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{% url 'tasks' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
