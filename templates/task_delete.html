{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/delete_task.css' %}">

<div class="task-container">
    <div class="delete-confirmation">
        <div class="delete-icon">⚠️</div>
        <h2>Delete Task?</h2>
        <p class="delete-message">Are you sure you want to delete this task? This action cannot be undone.</p>
        
        <div class="task-preview">
            <h3>{{ task.title }}</h3>
            {% if task.description %}
                <p>{{ task.description }}</p>
            {% endif %}
        </div>

        <form method="POST" class="delete-form">
            {% csrf_token %}
            <button type="submit" class="btn-confirm-delete">Delete Task</button>
            <a href="{% url 'tasks' %}" class="btn-cancel-delete">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
