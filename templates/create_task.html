{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/create_task.css' %}">

<div class="task-container">
    <form method="POST" class="edit-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" placeholder="Enter task title" required class="form-input">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="4" placeholder="Enter task description (optional)"></textarea>
        </div>

        <div class="form-group">
            <label for="doe_date">Due Date</label>
            <input type="datetime-local" id="doe_date" name="doe_date" class="form-input">
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-select">
                <option value="pending">Pending</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Create Task</button>
            <a href="{% url 'task_list' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
